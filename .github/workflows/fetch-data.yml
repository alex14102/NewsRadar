name: Fetch RSS feeds

on:
  schedule:
    - cron: "*/20 * * * *"   # every 20 minutes
  workflow_dispatch:           # manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install feedparser
        run: pip install feedparser

      - name: Fetch RSS feeds
        run: python scripts/fetch_feeds.py articles.json

      - name: Push to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash articles.json outside the worktree before switching branches
          mv articles.json /tmp/articles.json

          git fetch origin data 2>/dev/null || true
          git checkout -B data origin/data 2>/dev/null || git checkout --orphan data

          # Drop everything else from the data branch's working tree + index
          git rm -rf . --quiet 2>/dev/null || true
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          mv /tmp/articles.json articles.json
          git add articles.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "data: update articles $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin data --force
